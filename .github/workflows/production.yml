name: Main Check & Deploy

on:
  push:
    branches:
      - main

jobs:
  check:
    uses: ./.github/workflows/develop.yml

  deploy:
    name: Build & Deploy
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      # gh-pages ブランチへの書き込み用
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # V6
        with:
          node-version-file: '.node-version'
          cache: npm
          cache-dependency-path: './package-lock.json'

      - name: Setup safe-chain
        run: npm i -g @aikidosec/safe-chain && safe-chain setup-ci

      - name: Package Clean Install With Safe Chain
        run: npm ci --ignore-scripts

      - name: Build & Deploy to GitHub Pages
        run: |
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          npm run deploy -- -u "github-actions-bot <support+actions@github.com>" -m "${{ github.event.head_commit.message }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack Notification
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # 2.1.1
        if: always()
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ env.STATUS_MARK }} *${{ env.STATUS_TEXT }}*"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ env.STATUS_MARK }} *${{ env.STATUS_TEXT }}*"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*リポジトリ:*\n<${{ env.REPO_URL }}|${{ github.repository }}>"
                  - type: "mrkdwn"
                    text: "*JOB のステータス:*\n${{ job.status }}"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "必要に応じて<${{ env.ACTIONS_URL }}|JOB>のログを確認してください"
        env:
          STATUS_MARK: ${{ job.status == 'success' && ':チェックマーク_緑:' || ':x:' }}
          STATUS_TEXT: ${{ job.status == 'success' && '成功' || '失敗' }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          ACTIONS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
